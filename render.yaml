databases:
  - name: sickle-db
    databaseName: sickle_db
    user: sickle_user
    plan: free

services:
  - type: web
    name: sickle-marketplace
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sickle_project.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sickle-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10
