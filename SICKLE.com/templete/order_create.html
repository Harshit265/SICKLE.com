{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Order: {{ product.name }}</h2>
  <p class="muted">Available: {{ product.available_quantity }} {{ product.unit }}</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Submit Order</button>
    <a class="btn secondary" href="{% url 'product_detail' product.pk %}">Cancel</a>
  </form>
</div>
{% endblock %}
