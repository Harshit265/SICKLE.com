{% load static %}
<!DOCTYPE html>
<html>
<head>
<style>   /* Modern Theme */
:root {
    --primary-green: #2d6a4f;
    --light-bg: #f8f9fa;
    --white: #ffffff;
}

body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); }

.hero-section {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/images/farm-bg.jpg');
    color: white;
    border-radius: 15px;
}

.btn-primary {
    background-color: var(--primary-green);
    color: white;
    padding: 12px 30px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
}

/* Register Card */
.register-container {
    max-width: 500px;
    margin: 50px auto;
    background: var(--white);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}</style>

</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
