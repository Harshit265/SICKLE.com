{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sickle.com | Direct Farm to Business</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class=".bg">
  <header class="topbar">
    <a class="brand" href="/">
      <img src="{% static 'images/logo.png' %}" alt="logo" class="logo" />
      <span>Sickle.com</span>
    </a>

    <nav class="nav">
      <a href="/">Home</a>
      <a href="/smpt/">SMPT Marketplace</a>
      <a href="/dashboard/">Dashboard</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>© {% now "Y" %} Sickle.com — Direct Farm to Business</small>
  </footer>
</body>
</html>
