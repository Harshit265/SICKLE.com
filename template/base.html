{% load static %}
<!DOCTYPE html>
<html>
<head>
    <style>
        /* Using a pseudo-element to control opacity without fading text */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Linear gradient acts as a dark/light filter on top of the image */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("{% static 'images/farm-bg.jpg' %}");
            background-size: cover;
            background-position: center;
            opacity: 0.4; /* Set your desired transparency here */
            z-index: -1;
        }
        
        body { margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
