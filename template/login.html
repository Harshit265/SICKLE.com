{% extends "base.html" %}

{% block content %}
<div class="form-container" style="margin-top: 5rem;">
    <h2 style="font-size: 2rem; margin-bottom: 2rem; color: var(--text-main); text-align: center;">Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none;">Sign up here</a>.
    </p>
</div>
{% endblock %}
