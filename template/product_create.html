{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin-top: 2rem;">
    <h2 style="font-size: 2rem; margin-bottom: 2rem; color: var(--text-main);">List New Product</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Crop/Product Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Organic Wheat" required>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Price per Unit (₹)</label>
                <input type="number" step="0.01" name="price_per_unit" class="form-control" placeholder="e.g. 500" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Available Quantity</label>
                <input type="number" step="0.01" name="quantity" class="form-control" placeholder="e.g. 100" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Describe the quality, harvest date, etc."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Listing</button>
    </form>
</div>
{% endblock %}
