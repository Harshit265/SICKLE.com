{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin-top: 2rem;">
    <h2 style="font-size: 2rem; margin-bottom: 2rem; color: var(--text-main);">List New Product</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Crop/Product Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Organic Wheat" required>
        </div>

        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Category</label>
                <select name="category" id="id_category" class="form-control">
                    <option value="">--- Select Category ---</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">HSN Code</label>
                <select name="hsn_code" id="id_hsn_code" class="form-control">
                    <option value="">--- Select HSN Code ---</option>
                    {% for hsn in hsn_codes %}
                        <option value="{{ hsn.id }}" data-category="{{ hsn.category_id|default:'' }}">{{ hsn.code }} ({{ hsn.igst_rate }}% GST)</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Price per Unit (₹)</label>
                <input type="number" step="0.01" name="price_per_unit" class="form-control" placeholder="e.g. 500" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label class="form-label">Available Quantity</label>
                <input type="number" step="0.01" name="quantity" class="form-control" placeholder="e.g. 100" required>
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <textarea name="description" class="form-control" rows="4" placeholder="Describe the quality, harvest date, etc."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Listing</button>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const categorySelect = document.getElementById("id_category");
    const hsnSelect = document.getElementById("id_hsn_code");
    
    if (categorySelect && hsnSelect) {
        // Clone original options so we can re-add them if needed for compatibility, 
        // but display:none usually works fine in modern browsers.
        categorySelect.addEventListener("change", function() {
            const selectedCategoryId = this.value;
            let firstMatchFound = false;
            
            for (let i = 0; i < hsnSelect.options.length; i++) {
                const opt = hsnSelect.options[i];
                if (opt.value === "") continue; // skip default placeholder
                
                const optCatId = opt.getAttribute("data-category");
                
                // Show all if no category selected, otherwise filter
                if (selectedCategoryId === "" || optCatId === selectedCategoryId) {
                    opt.style.display = "";
                    
                    // Auto-select the first matching HSN code
                    if (!firstMatchFound && selectedCategoryId !== "") {
                        hsnSelect.value = opt.value;
                        firstMatchFound = true;
                    }
                } else {
                    opt.style.display = "none";
                }
            }
            
            // Revert to placeholder if no category matched
            if (!firstMatchFound && selectedCategoryId !== "") {
                hsnSelect.value = "";
            } else if (selectedCategoryId === "") {
                hsnSelect.value = "";
            }
        });
    }
});
</script>
{% endblock %}
